<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSnip | URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-900 dark:to-slate-800 min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <!-- Background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative max-w-4xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30">
                    <i data-lucide="link-2" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">LinkSnip</h1>
            </div>
            <button id="themeToggle"
                class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </header>

        <!-- Main Input Card -->
        <div class="glass-panel rounded-2xl p-6 md:p-8 shadow-xl mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="scissors" class="w-5 h-5 text-primary-600"></i>
                Shorten a URL
            </h2>

            <div class="flex flex-col md:flex-row gap-3">
                <div class="flex-1 relative">
                    <input type="url" id="urlInput" placeholder="Paste your long URL here..."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
                    <div id="inputError" class="absolute -bottom-6 left-0 text-sm text-red-500 hidden">Please enter a
                        valid URL</div>
                </div>
                <button id="shortenBtn"
                    class="px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl shadow-lg shadow-primary-500/30 transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    Shorten
                </button>
            </div>

            <!-- Custom slug option -->
            <div class="mt-4 flex items-center gap-2">
                <button id="customToggle"
                    class="text-sm text-primary-600 hover:text-primary-700 font-medium flex items-center gap-1">
                    <i data-lucide="settings-2" class="w-4 h-4"></i>
                    Custom alias
                </button>
            </div>

            <div id="customInputContainer" class="hidden mt-3">
                <div
                    class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/50 rounded-lg px-3 py-2">
                    <span>linksni.p/</span>
                    <input type="text" id="customSlug" placeholder="your-alias"
                        class="bg-transparent border-none focus:outline-none text-slate-800 dark:text-slate-100 font-mono flex-1">
                </div>
            </div>
        </div>

        <!-- Result Display -->
        <div id="resultContainer" class="hidden mb-8 animate-pop">
            <div class="glass-panel rounded-2xl p-6 border-2 border-primary-500/20 shadow-xl">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex-1 w-full">
                        <p class="text-sm text-slate-500 dark:text-slate-400 mb-1">Original URL</p>
                        <p id="originalUrlDisplay"
                            class="text-sm truncate text-slate-600 dark:text-slate-300 font-mono"></p>
                        <div class="mt-3 flex items-center gap-2">
                            <p class="text-sm text-slate-500 dark:text-slate-400">Short URL</p>
                            <span
                                class="px-2 py-0.5 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-xs rounded-full font-medium">Active</span>
                        </div>
                        <div class="flex items-center gap-3 mt-1">
                            <a id="shortUrlDisplay" href="#" target="_blank"
                                class="text-xl md:text-2xl font-bold text-primary-600 hover:text-primary-700 break-all"></a>
                            <button id="copyBtn"
                                class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors group relative">
                                <i data-lucide="copy" class="w-5 h-5 text-slate-500"></i>
                                <span id="copyTooltip"
                                    class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 transition-opacity">Copied!</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="qrBtn"
                            class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
                            title="Show QR Code">
                            <i data-lucide="qr-code" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <!-- QR Canvas -->
                <div id="qrContainer" class="hidden mt-4 flex justify-center">
                    <canvas id="qrCanvas" class="rounded-xl"></canvas>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="glass-panel rounded-2xl p-6 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="history" class="w-5 h-5 text-primary-600"></i>
                    Recent Links
                </h2>
                <button id="clearAllBtn" class="text-sm text-red-500 hover:text-red-600 font-medium hidden">Clear
                    all</button>
            </div>

            <div id="emptyState" class="text-center py-12 text-slate-400">
                <i data-lucide="link" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
                <p>No links shortened yet</p>
            </div>

            <div id="linksList" class="space-y-3">
                <!-- Links injected here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2 z-50">
        <i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i>
        <span id="toastMsg">Action completed</span>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State
        let links = JSON.parse(localStorage.getItem('links') || '[]');

        // DOM Elements
        const urlInput = document.getElementById('urlInput');
        const shortenBtn = document.getElementById('shortenBtn');
        const customToggle = document.getElementById('customToggle');
        const customInputContainer = document.getElementById('customInputContainer');
        const customSlug = document.getElementById('customSlug');
        const resultContainer = document.getElementById('resultContainer');
        const originalUrlDisplay = document.getElementById('originalUrlDisplay');
        const shortUrlDisplay = document.getElementById('shortUrlDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const copyTooltip = document.getElementById('copyTooltip');
        const qrBtn = document.getElementById('qrBtn');
        const qrContainer = document.getElementById('qrContainer');
        const qrCanvas = document.getElementById('qrCanvas');
        const linksList = document.getElementById('linksList');
        const emptyState = document.getElementById('emptyState');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const inputError = document.getElementById('inputError');
        const themeToggle = document.getElementById('themeToggle');

        // Theme handling
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // Custom alias toggle
        customToggle.addEventListener('click', () => {
            customInputContainer.classList.toggle('hidden');
            if (!customInputContainer.classList.contains('hidden')) {
                customSlug.focus();
            }
        });

        // Generate random slug
        function generateSlug(length = 6) {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Validate URL
        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        // Show toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2000);
        }

        // Draw simple QR code (visual representation)
        function drawQR(text) {
            const ctx = qrCanvas.getContext('2d');
            const size = 200;
            qrCanvas.width = size;
            qrCanvas.height = size;

            // Background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);

            // Generate pseudo-random pattern based on text
            const seed = text.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const random = (s) => {
                const x = Math.sin(s++) * 10000;
                return x - Math.floor(x);
            };

            let s = seed;
            const cellSize = size / 25;

            // Draw position patterns (corners)
            const drawPositionPattern = (x, y) => {
                ctx.fillStyle = '#000000';
                ctx.fillRect(x * cellSize, y * cellSize, 7 * cellSize, 7 * cellSize);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect((x + 1) * cellSize, (y + 1) * cellSize, 5 * cellSize, 5 * cellSize);
                ctx.fillStyle = '#000000';
                ctx.fillRect((x + 2) * cellSize, (y + 2) * cellSize, 3 * cellSize, 3 * cellSize);
            };

            drawPositionPattern(0, 0);
            drawPositionPattern(18, 0);
            drawPositionPattern(0, 18);

            // Draw data
            for (let i = 0; i < 25; i++) {
                for (let j = 0; j < 25; j++) {
                    // Skip position patterns
                    if ((i < 7 && j < 7) || (i > 17 && j < 7) || (i < 7 && j > 17)) continue;

                    s++;
                    if (random(s) > 0.5) {
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(i * cellSize, j * cellSize, cellSize, cellSize);
                    }
                }
            }
        }

        // Shorten URL
        shortenBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            const custom = customSlug.value.trim();

            if (!url) {
                inputError.textContent = 'Please enter a URL';
                inputError.classList.remove('hidden');
                return;
            }

            let processedUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                processedUrl = 'https://' + url;
            }

            if (!isValidUrl(processedUrl)) {
                inputError.textContent = 'Please enter a valid URL';
                inputError.classList.remove('hidden');
                return;
            }

            inputError.classList.add('hidden');

            // Check for duplicate custom slug
            let slug = custom || generateSlug();
            if (custom && links.find(l => l.slug === custom)) {
                inputError.textContent = 'This alias is already taken';
                inputError.classList.remove('hidden');
                return;
            }

            // Ensure unique slug
            while (!custom && links.find(l => l.slug === slug)) {
                slug = generateSlug();
            }

            const shortUrl = `${window.location.origin}${window.location.pathname}#${slug}`;

            const linkData = {
                id: Date.now(),
                original: processedUrl,
                slug: slug,
                shortUrl: shortUrl,
                clicks: 0,
                created: new Date().toISOString()
            };

            links.unshift(linkData);
            localStorage.setItem('links', JSON.stringify(links));

            // Show result
            originalUrlDisplay.textContent = processedUrl;
            shortUrlDisplay.textContent = shortUrl;
            shortUrlDisplay.href = shortUrl;
            resultContainer.classList.remove('hidden');
            qrContainer.classList.add('hidden');

            // Reset inputs
            urlInput.value = '';
            customSlug.value = '';
            customInputContainer.classList.add('hidden');

            renderLinks();
            showToast('URL shortened successfully!');
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', async () => {
            const text = shortUrlDisplay.textContent;
            await navigator.clipboard.writeText(text);
            copyTooltip.classList.remove('opacity-0');
            setTimeout(() => copyTooltip.classList.add('opacity-0'), 1500);
        });

        // QR Toggle
        qrBtn.addEventListener('click', () => {
            qrContainer.classList.toggle('hidden');
            if (!qrContainer.classList.contains('hidden')) {
                drawQR(shortUrlDisplay.textContent);
            }
        });

        // Render links list
        function renderLinks() {
            if (links.length === 0) {
                emptyState.classList.remove('hidden');
                linksList.innerHTML = '';
                clearAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            clearAllBtn.classList.remove('hidden');

            linksList.innerHTML = links.map((link, index) => `
                <div class="group flex flex-col md:flex-row items-start md:items-center justify-between p-4 bg-white/50 dark:bg-slate-800/30 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-primary-500/30 transition-all slide-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex-1 min-w-0 mb-3 md:mb-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-mono font-bold text-primary-600">${link.slug}</span>
                            <span class="text-xs text-slate-400">${new Date(link.created).toLocaleDateString()}</span>
                        </div>
                        <a href="${link.original}" target="_blank" class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary-600 truncate block max-w-md">
                            ${link.original}
                        </a>
                    </div>
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <button onclick="copyLink('${link.shortUrl}')" class="flex-1 md:flex-none px-3 py-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-1">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            Copy
                        </button>
                        <button onclick="visitLink('${link.slug}')" class="flex-1 md:flex-none px-3 py-2 bg-primary-50 dark:bg-primary-900/20 hover:bg-primary-100 dark:hover:bg-primary-900/30 text-primary-600 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-1">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                            Visit
                        </button>
                        <button onclick="deleteLink(${link.id})" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // Global functions for inline onclick handlers
        window.copyLink = async (url) => {
            await navigator.clipboard.writeText(url);
            showToast('Copied to clipboard!');
        };

        window.visitLink = (slug) => {
            const link = links.find(l => l.slug === slug);
            if (link) {
                window.open(link.original, '_blank');
                link.clicks++;
                localStorage.setItem('links', JSON.stringify(links));
            }
        };

        window.deleteLink = (id) => {
            links = links.filter(l => l.id !== id);
            localStorage.setItem('links', JSON.stringify(links));
            renderLinks();
            showToast('Link deleted');
        };

        clearAllBtn.addEventListener('click', () => {
            if (confirm('Delete all links?')) {
                links = [];
                localStorage.setItem('links', JSON.stringify(links));
                renderLinks();
                resultContainer.classList.add('hidden');
                showToast('All links cleared');
            }
        });

        // Handle hash-based routing (redirect)
        function handleHash() {
            const hash = window.location.hash.slice(1);
            if (hash) {
                const link = links.find(l => l.slug === hash);
                if (link) {
                    window.location.href = link.original;
                }
            }
        }

        // Enter key support
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') shortenBtn.click();
        });
        customSlug.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') shortenBtn.click();
        });

        // Init
        handleHash();
        renderLinks();
    </script>
</body>

</html>
